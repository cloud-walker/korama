name: Validate

on: workflow_call

jobs:
  check-types:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - run: pnpm check-types

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - run: pnpm lint

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - run: pnpm build

  health:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - run: pnpm build
      - uses: fallow-rs/fallow@v2
        with:
          comment: true
          sarif: true

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - run: pnpm -w exec playwright install --with-deps
      - run: pnpm coverage
